name: Deploy to server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/website:latest
          docker buildx build --platform linux/amd64,linux/arm64 -t $IMAGE_NAME . \
            --push \
            --build-arg NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY }} \
            --build-arg NEXT_PUBLIC_S3_CDN_URL=${{ secrets.NEXT_PUBLIC_S3_CDN_URL }} \
            --build-arg NEXT_PUBLIC_S3_BUCKET=${{ secrets.NEXT_PUBLIC_S3_BUCKET }} \
            --build-arg NEXT_PUBLIC_S3_REGION=${{ secrets.NEXT_PUBLIC_S3_REGION }} \
            --build-arg NEXT_PUBLIC_S3_ENDPOINT=${{ secrets.NEXT_PUBLIC_S3_ENDPOINT }} \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_GISCUS_REPO=${{ secrets.NEXT_PUBLIC_GISCUS_REPO }} \
            --build-arg NEXT_PUBLIC_GISCUS_REPO_ID=${{ secrets.NEXT_PUBLIC_GISCUS_REPO_ID }} \
            --build-arg NEXT_PUBLIC_GISCUS_CATEGORY=${{ secrets.NEXT_PUBLIC_GISCUS_CATEGORY }} \
            --build-arg NEXT_PUBLIC_GISCUS_CATEGORY_ID=${{ secrets.NEXT_PUBLIC_GISCUS_CATEGORY_ID }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }} \
            --build-arg NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }} \
            --build-arg NOTION_CV_PAGE_ID=${{ secrets.NOTION_CV_PAGE_ID }}

      - name: Prepare Deploy Directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            mkdir -p "$HOME/website"

      - name: Copy Compose File
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "compose.production.yml"
          target: "website"
          overwrite: true

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_IMAGE: "${{ secrets.DOCKER_USERNAME }}/website:latest"
          NOTION_CV_PAGE_ID: "${{ secrets.NOTION_CV_PAGE_ID }}"
          PROTECTED_EMAIL: "${{ secrets.PROTECTED_EMAIL }}"
          CLOUDFLARE_TURNSTILE_SECRET_KEY: "${{ secrets.CLOUDFLARE_TURNSTILE_SECRET_KEY }}"
          JWT_SECRET_KEY: "${{ secrets.JWT_SECRET_KEY }}"
          ASSET_GC_SECRET: "${{ secrets.ASSET_GC_SECRET }}"
          SUPABASE_SECRET_KEY: "${{ secrets.SUPABASE_SECRET_KEY }}"
          NEXT_PUBLIC_S3_CDN_URL: "${{ secrets.NEXT_PUBLIC_S3_CDN_URL }}"
          NEXT_PUBLIC_S3_BUCKET: "${{ secrets.NEXT_PUBLIC_S3_BUCKET }}"
          NEXT_PUBLIC_S3_REGION: "${{ secrets.NEXT_PUBLIC_S3_REGION }}"
          NEXT_PUBLIC_S3_ENDPOINT: "${{ secrets.NEXT_PUBLIC_S3_ENDPOINT }}"
          S3_SECRET_KEY: "${{ secrets.S3_SECRET_KEY }}"
          S3_ACCESS_KEY: "${{ secrets.S3_ACCESS_KEY }}"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}"
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_GISCUS_REPO: "${{ secrets.NEXT_PUBLIC_GISCUS_REPO }}"
          NEXT_PUBLIC_GISCUS_REPO_ID: "${{ secrets.NEXT_PUBLIC_GISCUS_REPO_ID }}"
          NEXT_PUBLIC_GISCUS_CATEGORY: "${{ secrets.NEXT_PUBLIC_GISCUS_CATEGORY }}"
          NEXT_PUBLIC_GISCUS_CATEGORY_ID: "${{ secrets.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}"
          NEXT_PUBLIC_SITE_URL: "${{ secrets.NEXT_PUBLIC_SITE_URL }}"
          NEXT_PUBLIC_BASE_URL: "${{ secrets.NEXT_PUBLIC_BASE_URL }}"
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: DOCKER_IMAGE,NOTION_CV_PAGE_ID,PROTECTED_EMAIL,CLOUDFLARE_TURNSTILE_SECRET_KEY,JWT_SECRET_KEY,ASSET_GC_SECRET,SUPABASE_SECRET_KEY,NEXT_PUBLIC_S3_CDN_URL,NEXT_PUBLIC_S3_BUCKET,NEXT_PUBLIC_S3_REGION,NEXT_PUBLIC_S3_ENDPOINT,S3_SECRET_KEY,S3_ACCESS_KEY,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_GISCUS_REPO,NEXT_PUBLIC_GISCUS_REPO_ID,NEXT_PUBLIC_GISCUS_CATEGORY,NEXT_PUBLIC_GISCUS_CATEGORY_ID,NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_BASE_URL
          script: |
            set -e

            APP_DIR="$HOME/website"
            COMPOSE_FILE="$APP_DIR/compose.production.yml"
            COMPOSE_ENV_FILE="$APP_DIR/.env.compose"
            ENV_FILE="$APP_DIR/.env.runtime"

            docker compose version >/dev/null
            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_TOKEN }}"

            umask 077
            cat > "$COMPOSE_ENV_FILE" <<EOF
            DOCKER_IMAGE=${DOCKER_IMAGE}
            EOF

            cat > "$ENV_FILE" <<EOF
            NOTION_CV_PAGE_ID=${NOTION_CV_PAGE_ID}
            PROTECTED_EMAIL=${PROTECTED_EMAIL}
            CLOUDFLARE_TURNSTILE_SECRET_KEY=${CLOUDFLARE_TURNSTILE_SECRET_KEY}
            JWT_SECRET_KEY=${JWT_SECRET_KEY}
            ASSET_GC_SECRET=${ASSET_GC_SECRET}
            SUPABASE_SECRET_KEY=${SUPABASE_SECRET_KEY}
            NEXT_PUBLIC_S3_CDN_URL=${NEXT_PUBLIC_S3_CDN_URL}
            NEXT_PUBLIC_S3_BUCKET=${NEXT_PUBLIC_S3_BUCKET}
            NEXT_PUBLIC_S3_REGION=${NEXT_PUBLIC_S3_REGION}
            NEXT_PUBLIC_S3_ENDPOINT=${NEXT_PUBLIC_S3_ENDPOINT}
            S3_SECRET_KEY=${S3_SECRET_KEY}
            S3_ACCESS_KEY=${S3_ACCESS_KEY}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
            NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
            NEXT_PUBLIC_GISCUS_REPO=${NEXT_PUBLIC_GISCUS_REPO}
            NEXT_PUBLIC_GISCUS_REPO_ID=${NEXT_PUBLIC_GISCUS_REPO_ID}
            NEXT_PUBLIC_GISCUS_CATEGORY=${NEXT_PUBLIC_GISCUS_CATEGORY}
            NEXT_PUBLIC_GISCUS_CATEGORY_ID=${NEXT_PUBLIC_GISCUS_CATEGORY_ID}
            NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
            NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
            EOF

            docker compose --project-name website --env-file "$COMPOSE_ENV_FILE" -f "$COMPOSE_FILE" config >/dev/null
            docker compose --project-name website --env-file "$COMPOSE_ENV_FILE" -f "$COMPOSE_FILE" pull
            docker compose --project-name website --env-file "$COMPOSE_ENV_FILE" -f "$COMPOSE_FILE" up -d --remove-orphans
