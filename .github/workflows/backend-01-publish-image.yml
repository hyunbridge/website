name: Publish Backend Image

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-01-publish-image.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-backend-image
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$DOCKER_TOKEN" || { echo "DOCKER_TOKEN is required"; exit 1; }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: hyunbridge
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend image
        env:
          IMAGE_REPOSITORY: hyunbridge/website-backend
          IMAGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file backend/Dockerfile \
            --tag "${IMAGE_REPOSITORY}:latest" \
            --tag "${IMAGE_REPOSITORY}:${IMAGE_SHA}" \
            backend \
            --push
